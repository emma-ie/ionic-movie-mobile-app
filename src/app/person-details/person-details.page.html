<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{person?.name}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <img [src]="person?.profile_path ? 'https://image.tmdb.org/t/p/w300' + person.profile_path : ''">

    <ion-card-header>
      <ion-card-title>{{ person?.name }} </ion-card-title>
      <ion-card-subtitle *ngIf="person?.birthday">{{ person.birthday }}</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <ion-card>
    <ion-card-content>

    </ion-card-content>
  </ion-card>
</ion-content>
