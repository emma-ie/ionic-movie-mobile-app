<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-title>
      {{ studentNum }}
    </ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="goNewMovies()">
        <ion-icon name="calendar-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="goWatchlist()">
        <ion-icon name="bookmark-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="goToFavourites()">
        <ion-icon color="danger" name="heart-outline"></ion-icon>
      </ion-button>

    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-input label="Search" placeholder="Enter movie name" [(ngModel)]="keyword"></ion-input>

    <ion-button (click)="searchMovies()" shape="round">Search all movies</ion-button>

    <ion-button (click)="getRandomMovie()" shape="round">
      <ion-icon name="dice-outline" fill="outline" slot="start"></ion-icon>
      Roll the dice
    </ion-button>

  <h4>Today's Trending Movies</h4>

  <p *ngIf="" movies.length===0>No movies could be loaded.</p>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let movie of movies">
        <ion-card>
          <img alt="Movie poster" [src]="'https://image.tmdb.org/t/p/w500/' + movie.poster_path"
            (click)="openMovie(movie)"/>

          <ion-card-header>
            <ion-card-title>{{ movie?.title }}</ion-card-title>
            <ion-card-subtitle>{{ movie?.release_date }}</ion-card-subtitle>
          </ion-card-header>

          <p class="overview">{{ movie?.overview }}</p>
          <ion-card-content>

            <ion-button shape="round" (click)="openMovie(movie)">
              View Details
            </ion-button>

            <ion-button shape="round" fill="outline" (click)="toggleFavourite(movie)">
              <ion-icon color="danger" [name]="isFavourite(movie) ? 'heart' : 'heart-outline'"></ion-icon>
            </ion-button>

            <ion-button shape="round" fill="outline" (click)="toggleWatchlist(movie)">
              <ion-icon [name]="isInWatchlist(movie) ? 'bookmark' : 'bookmark-outline'"></ion-icon>
            </ion-button>

          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
