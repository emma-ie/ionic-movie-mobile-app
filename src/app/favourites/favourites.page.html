<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start" fill="clear">
      <ion-back-button></ion-back-button>

      <ion-button (click)="goHome()">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Favourite Movies</ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="goNewMovies()">
        <ion-icon name="calendar-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="goWatchlist()">
        <ion-icon name="bookmark-outline"></ion-icon>
      </ion-button>

    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-text *ngIf="favourites.length === 0">
    <h1>No favourites added yet.</h1>
  </ion-text>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let fav of favourites">
        <ion-card>

          <img alt="Movie poster" [src]="'https://image.tmdb.org/t/p/w500/' + fav.poster_path"
            (click)="openMovie(fav)"/>

          <ion-card-header>
            <ion-card-title>{{ fav?.title }}</ion-card-title>
            <ion-card-subtitle>{{ fav?.release_date }}</ion-card-subtitle>
          </ion-card-header>

          <p class="overview">{{ fav?.overview }}</p>
          <ion-card-content class="buttons">

            <ion-button shape="round" (click)="openMovie(fav)">
              View Details
            </ion-button>

            <ion-button (click)="toggleFavourite(fav)" fill="outline" shape="round">
              <ion-icon slot="start" color="danger" name='heart'></ion-icon>
              Remove
            </ion-button>

          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
