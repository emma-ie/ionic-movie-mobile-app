<ion-header [translucent]="true">
  <ion-toolbar>
     
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    
    <ion-title>Favourite Movies</ion-title>
    <ion-button (click)="goHome()" slot="secondary" fill="clear">
      <ion-icon name="home-outline"></ion-icon>
    </ion-button>
    <ion-button (click)="goNewMovies()" slot="primary" fill="clear">
      <ion-icon name="calendar-outline"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-text *ngIf="favourites.length === 0">
    <h1>No favourites added yet.</h1>
  </ion-text>

  <ion-card *ngFor="let movie of favourites">
    <img alt="Movie poster" [src]="'https://image.tmdb.org/t/p/w500/' + movie.poster_path" (click)="openMovie(movie)" />
    <ion-card-header>
      <ion-card-title>{{ movie.title }}</ion-card-title>
      <ion-card-subtitle>{{ movie.release_date }}</ion-card-subtitle>
      {{movie.overview}}
    </ion-card-header>

    <ion-card-content>
      <ion-button (click)="toggleFavourite(movie)" expand="block" shape="round">
        <ion-icon name='heart'></ion-icon>
        Unfavourite
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
