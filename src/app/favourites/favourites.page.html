<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start" fill="clear">
      <ion-back-button></ion-back-button>

      <ion-button (click)="goHome()">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Favourite Movies</ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="goNewMovies()">
        <ion-icon name="calendar-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="goWatchlist()">
        <ion-icon name="bookmark-outline"></ion-icon>
      </ion-button>

    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-text *ngIf="favourites.length === 0">
    <h1>No favourites added yet.</h1>
  </ion-text>

  <ion-card *ngFor="let movie of favourites">
    <img alt="Movie poster" [src]="'https://image.tmdb.org/t/p/w500/' + movie.poster_path" (click)="openMovie(movie)" />

    <ion-card-header>
      <ion-card-title>{{ movie.title }}</ion-card-title>
      <ion-card-subtitle>{{ movie.release_date }}</ion-card-subtitle>
      {{ movie.overview }}
    </ion-card-header>

    <ion-card-content>
      <ion-button (click)="toggleFavourite(movie)" expand="block" shape="round">
        <ion-icon name='heart'></ion-icon>
        Unfavourite
      </ion-button>

    </ion-card-content>
  </ion-card>
</ion-content>
