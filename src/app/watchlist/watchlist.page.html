<ion-header [translucent]="true">
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>

      <ion-button (click)="goHome()">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>

    </ion-buttons>

    <ion-title>Watchlist</ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="goNewMovies()">
        <ion-icon name="calendar-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="goToFavourites()">
        <ion-icon color="danger" name="heart-outline"></ion-icon>
      </ion-button>

    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-text *ngIf="movies.length === 0">
    <h1>No movies in watchlist yet.</h1>
  </ion-text>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" size-lg="3" *ngFor="let movie of movies">
        <ion-card>
          <img alt="Movie poster" [src]="'https://image.tmdb.org/t/p/w500/' + movie.poster_path"
            (click)="openMovie(movie)" />

          <ion-card-header>
            <ion-card-title>{{ movie?.title }}</ion-card-title>
            <ion-card-subtitle>{{ movie?.release_date }}</ion-card-subtitle>
          </ion-card-header>

          <p class="overview">{{ movie?.overview }}</p>
          <ion-card-content class="buttons">

            <ion-button shape="round" (click)="openMovie(movie)">
              View Details
            </ion-button>

            <ion-button (click)="toggleWatchlist(movie)" fill="outline" shape="round">
              <ion-icon slot="start" name='bookmark'></ion-icon>
              Remove
            </ion-button>

          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
